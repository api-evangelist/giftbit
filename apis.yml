aid: giftbit
name: Giftbit
description: >
  Giftbit is a gift card and digital reward platform with a REST API for
  distributing digital gift cards, managing reward campaigns, tracking
  redemptions, and accessing a marketplace of 1,500+ brand integrations across
  40+ countries. The API enables businesses to send single-brand or multi-brand
  rewards via email delivery, shortlinks, direct links, or in-app embeds, with
  no platform subscription fees — paying only the face value of rewards sent.
